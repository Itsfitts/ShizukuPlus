name: ShizukuCrimson CI Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Accept Android SDK Licenses & Install CMake and NDK
      run: |
        yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses
        "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "cmake;3.31.0" "ndk;29.0.13113456"

    - name: Grant Execute Permission for Gradle
      run: chmod +x gradlew

    - name: Build Project
      run: ./gradlew assembleRelease --no-daemon

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ShizukuCrimson-Manager
        path: out/apk/*.apk
